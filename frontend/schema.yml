openapi: 3.0.3
info:
  title: Job Application Tracker API
  version: 1.0.0
  description: A RESTful API for tracking job applications, managing CV uploads, setting
    reminders, and viewing application analytics.
paths:
  /api/v1/analytics/dashboard/:
    get:
      operationId: v1_analytics_dashboard_retrieve
      description: Returns all key metrics in a single call. Designed for the main
        dashboard to avoid multiple round-trips.
      summary: Main dashboard summary
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
          description: ''
  /api/v1/analytics/funnel/:
    get:
      operationId: v1_analytics_funnel_list
      description: For each pipeline stage, returns the count and percentage of applications
        that ever reached that stage (including those that have since moved on or
        been rejected).
      summary: Stage conversion funnel
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversionFunnelItem'
          description: ''
  /api/v1/analytics/heatmap/:
    get:
      operationId: v1_analytics_heatmap_list
      description: Returns one entry per day for the last 365 days. Days with zero
        activity are included so the frontend can render a full heatmap grid.
      summary: Daily application activity (heatmap data)
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HeatmapDay'
          description: ''
  /api/v1/analytics/response-rate/:
    get:
      operationId: v1_analytics_response_rate_retrieve
      description: 'response_rate: % of applications that moved past ''applied''.
        interview_rate: % that reached interview stage. offer_rate: % that received
        an offer.'
      summary: Response, interview, and offer rates
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseRate'
          description: ''
  /api/v1/analytics/sources/:
    get:
      operationId: v1_analytics_sources_list
      description: Only sources with at least one application are returned, sorted
        by count descending.
      summary: Applications by discovery source
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceBreakdownItem'
          description: ''
  /api/v1/analytics/stage-duration/:
    get:
      operationId: v1_analytics_stage_duration_list
      description: Computed from StatusHistory entries. Only transitions with at least
        one data point are returned. sample_size tells you how many transitions the
        average is based on.
      summary: Average days between pipeline stages
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StageDurationItem'
          description: ''
  /api/v1/analytics/status/:
    get:
      operationId: v1_analytics_status_list
      description: Returns all pipeline statuses with their application count. Zero
        counts are included.
      summary: Application count per status
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatusBreakdownItem'
          description: ''
  /api/v1/analytics/top-companies/:
    get:
      operationId: v1_analytics_top_companies_list
      description: |-
        Shared base for all analytics views.
        Provides a scoped queryset: own applications for job seekers,
        all applications for admins.
        Accepts an optional ?user_id= query param for admins to scope to one user.
      summary: Most applied-to companies
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Max companies to return (default 10)
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopCompany'
          description: ''
  /api/v1/analytics/volume/monthly/:
    get:
      operationId: v1_analytics_volume_monthly_list
      description: |-
        Shared base for all analytics views.
        Provides a scoped queryset: own applications for job seekers,
        all applications for admins.
        Accepts an optional ?user_id= query param for admins to scope to one user.
      summary: Monthly application volume
      parameters:
      - in: query
        name: months
        schema:
          type: integer
        description: Number of months to include (default 12, max 24)
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonthlyVolumeItem'
          description: ''
  /api/v1/analytics/volume/weekly/:
    get:
      operationId: v1_analytics_volume_weekly_list
      description: |-
        Shared base for all analytics views.
        Provides a scoped queryset: own applications for job seekers,
        all applications for admins.
        Accepts an optional ?user_id= query param for admins to scope to one user.
      summary: Weekly application volume
      parameters:
      - in: query
        name: weeks
        schema:
          type: integer
        description: Number of weeks to include (default 12, max 52)
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeeklyVolumeItem'
          description: ''
  /api/v1/applications/:
    get:
      operationId: v1_applications_list
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: List job applications
      parameters:
      - in: query
        name: applied_after
        schema:
          type: string
        description: Applied on or after (YYYY-MM-DD)
      - in: query
        name: is_active
        schema:
          type: string
        description: true = active only, false = terminal only
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Order by: created_at, applied_date, company_name, -created_at
          …'
      - in: query
        name: page
        schema:
          type: string
        description: Page number
      - in: query
        name: page_size
        schema:
          type: string
        description: Results per page (max 100)
      - in: query
        name: search
        schema:
          type: string
        description: Search company, title, location, notes
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status (repeatable)
      - in: query
        name: work_mode
        schema:
          type: string
        description: Filter by work mode
      tags:
      - applications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobApplicationListList'
          description: ''
    post:
      operationId: v1_applications_create
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Create a new application
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApplicationWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobApplicationWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobApplicationWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicationWrite'
          description: ''
  /api/v1/applications/{id}/:
    get:
      operationId: v1_applications_retrieve
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Retrieve application detail
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - applications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicationDetail'
          description: ''
    put:
      operationId: v1_applications_update
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Full update
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApplicationWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobApplicationWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobApplicationWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicationWrite'
          description: ''
    patch:
      operationId: v1_applications_partial_update
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Partial update (status change, notes, etc.)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedJobApplicationWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedJobApplicationWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedJobApplicationWriteRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicationWrite'
          description: ''
    delete:
      operationId: v1_applications_destroy
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Delete an application
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - applications
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/applications/{id}/documents/:
    post:
      operationId: v1_applications_documents_create
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Upload a document (CV, cover letter) to an application
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - applications
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
  /api/v1/applications/{id}/documents/{doc_id}/:
    delete:
      operationId: v1_applications_documents_destroy
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Delete a document from an application
      parameters:
      - in: path
        name: doc_id
        schema:
          type: string
          pattern: ^[0-9a-f-]+$
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - applications
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/applications/{id}/history/:
    get:
      operationId: v1_applications_history_list
      description: |-
        Full CRUD for job applications.
        Users only ever see and modify their own applications.
        Admins can see all (scoped in get_queryset).
      summary: Get status change history for an application
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - applications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStatusHistoryList'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: |-
        Authenticate with email + password.
        Returns access token, refresh token, and basic user info.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: |-
        Invalidate the provided refresh token by adding it to the blacklist.
        The access token will expire naturally (short-lived by design).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      security:
      - jwtAuth: []
      responses:
        '205':
          description: Logout successful — refresh token blacklisted.
        '400':
          description: Invalid or missing refresh token.
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      description: |-
        GET  — return the authenticated user's full profile.
        PATCH — partial update (preferred for frontend).
        PUT  — full update.
        Avatar upload via multipart/form-data.
      summary: Get own profile
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: v1_auth_me_update
      description: |-
        GET  — return the authenticated user's full profile.
        PATCH — partial update (preferred for frontend).
        PUT  — full update.
        Avatar upload via multipart/form-data.
      summary: Replace own profile
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: v1_auth_me_partial_update
      description: |-
        GET  — return the authenticated user's full profile.
        PATCH — partial update (preferred for frontend).
        PUT  — full update.
        Avatar upload via multipart/form-data.
      summary: Update own profile
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/v1/auth/me/password/:
    post:
      operationId: v1_auth_me_password_create
      description: |-
        Change the authenticated user's password.
        Requires the current password for verification.
        After a successful change, all existing tokens remain valid until they expire
        — consider logging the user out on the frontend after this call.
      summary: Change own password
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/register/:
    post:
      operationId: v1_auth_register_create
      description: |-
        Register a new Job Seeker account.
        No authentication required.
        Returns the created user profile (no tokens — user must login separately).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: Refresh an expired access token using a valid refresh token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/users/:
    get:
      operationId: v1_auth_users_list
      description: |-
        Returns a paginated list of all users.
        Restricted to Admin role only.
      summary: List all users (admin only)
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - admin
          - job_seeker
        description: |-
          * `job_seeker` - Job Seeker
          * `admin` - Admin
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserPublicList'
          description: ''
  /api/v1/reminders/:
    get:
      operationId: v1_reminders_list
      description: |-
        CRUD for reminders.
        Scoped to the authenticated user's own reminders.
      summary: List reminders
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - reminders
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReminderListList'
          description: ''
    post:
      operationId: v1_reminders_create
      description: |-
        CRUD for reminders.
        Scoped to the authenticated user's own reminders.
      summary: Create a reminder
      tags:
      - reminders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReminderWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReminderWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderWrite'
          description: ''
  /api/v1/reminders/{id}/:
    get:
      operationId: v1_reminders_retrieve
      description: |-
        CRUD for reminders.
        Scoped to the authenticated user's own reminders.
      summary: Retrieve a reminder
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - reminders
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderDetail'
          description: ''
    put:
      operationId: v1_reminders_update
      description: |-
        CRUD for reminders.
        Scoped to the authenticated user's own reminders.
      summary: Full update
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - reminders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReminderWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReminderWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderWrite'
          description: ''
    patch:
      operationId: v1_reminders_partial_update
      description: |-
        CRUD for reminders.
        Scoped to the authenticated user's own reminders.
      summary: Partial update (reschedule, cancel)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - reminders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedReminderWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedReminderWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedReminderWriteRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderWrite'
          description: ''
    delete:
      operationId: v1_reminders_destroy
      description: |-
        CRUD for reminders.
        Scoped to the authenticated user's own reminders.
      summary: Delete a reminder
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - reminders
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/reminders/{id}/cancel/:
    post:
      operationId: v1_reminders_cancel_create
      description: |-
        Convenience endpoint to deactivate a reminder without deleting it.
        Useful for frontend 'Cancel reminder' buttons — no request body needed.
      summary: Cancel a reminder (sets is_active=False)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - reminders
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
