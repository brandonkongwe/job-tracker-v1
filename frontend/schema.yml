      - from_stage
      - label
      - sample_size
      - to_stage
    StatusBreakdownItem:
      type: object
      properties:
        status:
          type: string
        label:
          type: string
        count:
          type: integer
      required:
      - count
      - label
      - status
    StatusHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        from_status:
          allOf:
          - $ref: '#/components/schemas/ToStatusEnum'
          readOnly: true
        from_status_display:
          type: string
          readOnly: true
        to_status:
          allOf:
          - $ref: '#/components/schemas/ToStatusEnum'
          readOnly: true
        to_status_display:
          type: string
          readOnly: true
        changed_at:
          type: string
          format: date-time
          readOnly: true
        note:
          type: string
          readOnly: true
          description: Optional note about why the status changed.
      required:
      - changed_at
      - from_status
      - from_status_display
      - id
      - note
      - to_status
      - to_status_display
    ToStatusEnum:
      enum:
      - saved
      - applied
      - screening
      - interview
      - offer
      - accepted
      - rejected
      - withdrawn
      type: string
      description: |-
        * `saved` - Saved
        * `applied` - Applied
        * `screening` - Screening
        * `interview` - Interview
        * `offer` - Offer
        * `accepted` - Accepted
        * `rejected` - Rejected
        * `withdrawn` - Withdrawn
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    TopCompany:
      type: object
      properties:
        company_name:
          type: string
        count:
          type: integer
      required:
      - company_name
      - count
    UserProfile:
      type: object
      description: |-
        Full profile for the authenticated user's own account.
        Readable + writable (except id, email, role, date_joined).
        Email changes are handled separately to allow re-verification in future.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        full_name:
          type: string
          readOnly: true
        role:
          type: string
          readOnly: true
        bio:
          type: string
        location:
          type: string
          maxLength: 150
        website:
          type: string
          format: uri
          maxLength: 200
        avatar:
          type: string
          format: uri
          nullable: true
        application_count:
          type: string
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - application_count
      - date_joined
      - email
      - first_name
      - full_name
      - id
      - last_login
      - last_name
      - role
    UserProfileRequest:
      type: object
      description: |-
        Full profile for the authenticated user's own account.
        Readable + writable (except id, email, role, date_joined).
        Email changes are handled separately to allow re-verification in future.
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        bio:
          type: string
        location:
          type: string
          maxLength: 150
        website:
          type: string
          format: uri
          maxLength: 200
        avatar:
          type: string
          format: binary
          nullable: true
      required:
      - first_name
      - last_name
    UserPublic:
      type: object
      description: |-
        Minimal read-only representation — safe for admin user listings.
        Does not expose email or personal details of other users.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        avatar:
          type: string
          format: uri
          readOnly: true
          nullable: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - avatar
      - date_joined
      - full_name
      - id
      - role
    WeeklyVolumeItem:
      type: object
      properties:
        week:
          type: string
          description: ISO week label, e.g. '2024-W22'
        count:
          type: integer
      required:
      - count
      - week
    WorkModeEnum:
      enum:
      - remote
      - hybrid
      - on_site
      type: string
      description: |-
        * `remote` - Remote
        * `hybrid` - Hybrid
        * `on_site` - On-site
